<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英単語クイズ | 神奈川県高校入試対策</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1828;
    --card: #221f35;
    --border: #2e2b45;
    --text: #fffffe;
    --sub: #a7a9be;
    --accent1: #ff8906;
    --accent2: #f25f4c;
    --accent3: #e53170;
    --correct: #3da35d;
    --wrong: #e53170;
    --gold: #ffd700;
    --silver: #c0c0c0;
    --bronze: #cd7f32;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== STAR BACKGROUND ===== */
  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(255,137,6,0.05) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(229,49,112,0.05) 0%, transparent 60%);
  }

  /* ===== LAYOUT ===== */
  #app {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 16px;
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  .header {
    text-align: center;
    padding: 24px 0 16px;
  }
  .header h1 {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.5rem;
    background: linear-gradient(135deg, var(--accent1), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }
  .header p {
    color: var(--sub);
    font-size: 0.8rem;
    margin-top: 4px;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ===== LEVEL SELECT ===== */
  .level-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-top: 16px;
  }

  .level-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    text-align: left;
  }
  .level-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    border-radius: 4px 0 0 4px;
  }
  .level-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent1);
    box-shadow: 0 8px 24px rgba(255,137,6,0.15);
  }
  .level-card:active { transform: translateY(0); }

  .level-num {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 2.2rem;
    line-height: 1;
  }
  .level-name {
    font-weight: 700;
    font-size: 0.9rem;
    margin-top: 4px;
    color: var(--text);
  }
  .level-desc {
    font-size: 0.72rem;
    color: var(--sub);
    margin-top: 2px;
  }
  .level-count {
    font-size: 0.7rem;
    color: var(--sub);
    margin-top: 6px;
  }
  .level-stars {
    position: absolute;
    top: 14px; right: 14px;
    font-size: 0.8rem;
  }

  /* level colors */
  .lv1::before { background: #4fc3f7; }
  .lv1 .level-num { color: #4fc3f7; }
  .lv2::before { background: #81c784; }
  .lv2 .level-num { color: #81c784; }
  .lv3::before { background: #aed581; }
  .lv3 .level-num { color: #aed581; }
  .lv4::before { background: #fff176; }
  .lv4 .level-num { color: #fff176; }
  .lv5::before { background: #ffd54f; }
  .lv5 .level-num { color: #ffd54f; }
  .lv6::before { background: #ffb74d; }
  .lv6 .level-num { color: #ffb74d; }
  .lv7::before { background: #ff8a65; }
  .lv7 .level-num { color: #ff8a65; }
  .lv8::before { background: #f06292; }
  .lv8 .level-num { color: #f06292; }
  .lv9::before { background: #ce93d8; }
  .lv9 .level-num { color: #ce93d8; }
  .lv10::before { background: linear-gradient(180deg, var(--gold), var(--accent1)); }
  .lv10 .level-num {
    background: linear-gradient(135deg, var(--gold), var(--accent1));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .badge-new {
    background: var(--accent3);
    color: white;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 99px;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* ===== QUIZ SCREEN ===== */
  .quiz-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .back-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--sub);
    width: 36px; height: 36px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .back-btn:hover { color: var(--text); border-color: var(--accent1); }

  .progress-wrap {
    flex: 1;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--sub);
    margin-bottom: 5px;
  }
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent1), var(--accent3));
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .score-badge {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px 12px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    color: var(--accent1);
    white-space: nowrap;
  }

  /* ===== QUESTION CARD ===== */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px 24px;
    margin-bottom: 16px;
    position: relative;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .q-type-tag {
    position: absolute;
    top: 14px; right: 14px;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 99px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .tag-word { background: rgba(77,195,247,0.15); color: #4fc3f7; }
  .tag-phrase { background: rgba(240,98,146,0.15); color: #f06292; }

  .q-label {
    font-size: 0.72rem;
    color: var(--sub);
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }
  .q-word {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 2.2rem;
    color: var(--text);
    line-height: 1.1;
    word-break: break-word;
  }
  .q-context {
    font-size: 0.8rem;
    color: var(--sub);
    margin-top: 8px;
    font-style: italic;
    line-height: 1.5;
  }

  /* ===== OPTIONS ===== */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .opt-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--text);
    border-radius: 14px;
    padding: 14px 10px;
    font-size: 0.88rem;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.18s;
    text-align: center;
    line-height: 1.4;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .opt-btn:hover:not(:disabled) {
    border-color: var(--accent1);
    background: rgba(255,137,6,0.08);
    transform: translateY(-1px);
  }
  .opt-btn:active:not(:disabled) { transform: translateY(0); }
  .opt-btn.correct {
    border-color: var(--correct);
    background: rgba(61,163,93,0.18);
    color: #7ee8a2;
    font-weight: 700;
  }
  .opt-btn.wrong {
    border-color: var(--wrong);
    background: rgba(229,49,112,0.15);
    color: #ff6b9d;
  }
  .opt-btn:disabled { cursor: default; }

  /* ===== RESULT TOAST ===== */
  .result-toast {
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 14px;
    display: none;
    align-items: flex-start;
    gap: 12px;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .result-toast.show { display: flex; }
  .result-toast.correct-toast {
    background: rgba(61,163,93,0.12);
    border: 1px solid rgba(61,163,93,0.3);
  }
  .result-toast.wrong-toast {
    background: rgba(229,49,112,0.1);
    border: 1px solid rgba(229,49,112,0.3);
  }
  .toast-icon { font-size: 1.4rem; flex-shrink: 0; }
  .toast-text {}
  .toast-main { font-weight: 700; font-size: 0.9rem; }
  .toast-sub { font-size: 0.78rem; color: var(--sub); margin-top: 2px; }
  .toast-answer { font-size: 0.8rem; margin-top: 4px; }
  .toast-answer span { color: var(--accent1); font-weight: 700; }

  .next-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    border: none;
    color: white;
    border-radius: 14px;
    padding: 15px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }
  .next-btn.show { display: block; }
  .next-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .next-btn:active { transform: translateY(0); }

  /* ===== RESULT SCREEN ===== */
  .result-screen {
    text-align: center;
    padding: 20px 0;
  }
  .result-emoji {
    font-size: 4rem;
    margin-bottom: 12px;
    animation: bounce 0.5s ease;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .result-title {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.6rem;
    margin-bottom: 6px;
  }
  .result-score {
    font-size: 3.5rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent1), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin: 16px 0 8px;
  }
  .result-detail {
    color: var(--sub);
    font-size: 0.85rem;
    margin-bottom: 24px;
  }
  .result-msg {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 20px;
    font-size: 0.88rem;
    line-height: 1.7;
    color: var(--sub);
    margin-bottom: 24px;
    text-align: left;
  }
  .result-msg strong { color: var(--text); }

  .result-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .retry-btn, .home-btn {
    padding: 15px;
    border-radius: 14px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .retry-btn {
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    border: none;
    color: white;
  }
  .retry-btn:hover { opacity: 0.9; }
  .home-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--text);
  }
  .home-btn:hover { border-color: var(--accent1); }

  /* ===== WRONG LIST ===== */
  .wrong-list-section {
    margin-top: 24px;
    text-align: left;
  }
  .wrong-list-title {
    font-size: 0.8rem;
    color: var(--sub);
    margin-bottom: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .wrong-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    font-size: 0.82rem;
    line-height: 1.6;
  }
  .wi-word { font-weight: 700; color: var(--text); font-size: 0.95rem; }
  .wi-meaning { color: var(--accent1); }
  .wi-miss { color: var(--sub); font-size: 0.75rem; }

  /* ===== SECTION TITLE ===== */
  .section-title {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--sub);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
    margin-top: 8px;
  }

  /* ===== CONFETTI ===== */
  .confetti-wrap {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
  }
  .confetti-piece {
    position: absolute;
    top: -10px;
    width: 8px; height: 8px;
    border-radius: 2px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ===== SHIMMER EFFECT ===== */
  .lv10 {
    background: linear-gradient(135deg, #1a1828, #221f35);
    border-color: rgba(255,215,0,0.3);
  }
  .lv10:hover {
    border-color: var(--gold);
    box-shadow: 0 8px 24px rgba(255,215,0,0.2);
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 400px) {
    .level-grid { grid-template-columns: repeat(2, 1fr); }
    .options { grid-template-columns: 1fr 1fr; }
    .q-word { font-size: 1.8rem; }
  }
</style>
</head>
<body>
<div class="stars"></div>
<div id="app">
  <div class="header">
    <h1>🎯 英単語クイズ</h1>
    <p>神奈川県公立高校入試 対策アプリ</p>
  </div>

  <!-- LEVEL SELECT SCREEN -->
  <div id="screen-home" class="screen active">
    <p class="section-title">レベルを選ぼう</p>
    <div class="level-grid" id="levelGrid"></div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-header">
      <button class="back-btn" onclick="goHome()">←</button>
      <div class="progress-wrap">
        <div class="progress-info">
          <span id="qNum">1 / 10</span>
          <span id="levelLabel">Lv.1</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>
      <div class="score-badge" id="scoreBadge">0点</div>
    </div>

    <div class="question-card" id="questionCard">
      <span class="q-type-tag" id="qTypeTag"></span>
      <div class="q-label">日本語の意味は？</div>
      <div class="q-word" id="qWord"></div>
      <div class="q-context" id="qContext"></div>
    </div>

    <div class="options" id="optionsWrap"></div>

    <div class="result-toast" id="resultToast">
      <div class="toast-icon" id="toastIcon"></div>
      <div class="toast-text">
        <div class="toast-main" id="toastMain"></div>
        <div class="toast-sub" id="toastSub"></div>
        <div class="toast-answer" id="toastAnswer"></div>
      </div>
    </div>

    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">次の問題へ →</button>
  </div>

  <!-- RESULT SCREEN -->
  <div id="screen-result" class="screen">
    <div class="result-screen">
      <div class="result-emoji" id="resultEmoji"></div>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-score" id="resultScore"></div>
      <div class="result-detail" id="resultDetail"></div>
      <div class="result-msg" id="resultMsg"></div>
      <div class="result-btns">
        <button class="retry-btn" onclick="retryLevel()">もう一度 🔄</button>
        <button class="home-btn" onclick="goHome()">ホームへ 🏠</button>
      </div>
      <div class="wrong-list-section" id="wrongListSection"></div>
    </div>
  </div>
</div>

<div class="confetti-wrap" id="confettiWrap"></div>

<script>

// ============================================================
// QUIZ STATE
// ============================================================
let currentLevel = null;
let questions = [];
let currentQ = 0;
let score = 0;
let answered = false;
let wrongList = [];

// ============================================================
// INIT - BUILD LEVEL CARDS
// ============================================================
function init() {
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  
  const emojis = ['⭐','🌱','📗','📘','📒','🔥','💪','🎯','🚀','👑'];
  const starLabels = ['★','★★','★★★','★★★','★★★★','★★★★','★★★★★','★★★★★','★★★★★','🏆'];

  for (let lv = 1; lv <= 10; lv++) {
    const d = VOCAB[lv];
    const card = document.createElement('div');
    card.className = `level-card lv${lv}`;
    card.onclick = () => startLevel(lv);
    
    const isNew = lv >= 8;
    card.innerHTML = `
      <div class="level-stars">${starLabels[lv-1]}</div>
      <div class="level-num">${emojis[lv-1]}</div>
      <div class="level-name">Lv.${lv} ${d.name}${isNew ? '<span class="badge-new">NEW</span>' : ''}</div>
      <div class="level-desc">${d.desc}</div>
      <div class="level-count">${d.words.length}問収録</div>
    `;
    grid.appendChild(card);
  }
}

// ============================================================
// START LEVEL
// ============================================================
function startLevel(lv) {
  currentLevel = lv;
  wrongList = [];
  
  const allWords = [...VOCAB[lv].words];
  // shuffle and pick 10
  const shuffled = allWords.sort(() => Math.random() - 0.5).slice(0, 10);
  questions = shuffled;
  currentQ = 0;
  score = 0;
  answered = false;

  document.getElementById('screen-home').classList.remove('active');
  document.getElementById('screen-result').classList.remove('active');
  document.getElementById('screen-quiz').classList.add('active');

  renderQuestion();
}

// ============================================================
// RENDER QUESTION
// ============================================================
function renderQuestion() {
  if (currentQ >= questions.length) {
    showResult();
    return;
  }

  answered = false;
  const q = questions[currentQ];
  const total = questions.length;

  // header
  document.getElementById('qNum').textContent = `${currentQ + 1} / ${total}`;
  document.getElementById('levelLabel').textContent = `Lv.${currentLevel}`;
  document.getElementById('scoreBadge').textContent = `${score}点`;
  document.getElementById('progressFill').style.width = `${(currentQ / total) * 100}%`;

  // question
  const isPhrase = q.type === 'phrase';
  const tag = document.getElementById('qTypeTag');
  tag.className = `q-type-tag ${isPhrase ? 'tag-phrase' : 'tag-word'}`;
  tag.textContent = isPhrase ? '熟語' : '単語';

  document.getElementById('qWord').textContent = q.word;
  document.getElementById('qContext').textContent = q.context ? `例: ${q.context}` : '';

  // options - generate wrong answers from same level
  const allWords = VOCAB[currentLevel].words;
  const wrongOptions = allWords
    .filter(w => w.meaning !== q.meaning)
    .sort(() => Math.random() - 0.5)
    .slice(0, 3)
    .map(w => w.meaning);

  const options = [q.meaning, ...wrongOptions].sort(() => Math.random() - 0.5);

  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(btn, opt, q.meaning);
    wrap.appendChild(btn);
  });

  // hide toast and next
  const toast = document.getElementById('resultToast');
  toast.className = 'result-toast';
  document.getElementById('nextBtn').className = 'next-btn';
}

// ============================================================
// CHECK ANSWER
// ============================================================
function checkAnswer(btn, selected, correct) {
  if (answered) return;
  answered = true;

  const isCorrect = selected === correct;
  const q = questions[currentQ];

  // style buttons
  const allBtns = document.querySelectorAll('.opt-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
  });
  if (!isCorrect) {
    btn.classList.add('wrong');
    wrongList.push(q);
  } else {
    score += 10;
  }

  // toast
  const toast = document.getElementById('resultToast');
  if (isCorrect) {
    toast.className = 'result-toast correct-toast show';
    document.getElementById('toastIcon').textContent = '✅';
    document.getElementById('toastMain').textContent = '正解！';
    const msgs = ['すごい！', 'その調子！', 'バッチリ！', 'よく覚えてた！', 'ナイス！'];
    document.getElementById('toastSub').textContent = msgs[Math.floor(Math.random() * msgs.length)];
    document.getElementById('toastAnswer').innerHTML = '';
  } else {
    toast.className = 'result-toast wrong-toast show';
    document.getElementById('toastIcon').textContent = '❌';
    document.getElementById('toastMain').textContent = '残念...';
    document.getElementById('toastSub').textContent = 'あとで復習しよう';
    document.getElementById('toastAnswer').innerHTML = `正解: <span>${correct}</span>`;
  }

  // next btn
  const nextBtn = document.getElementById('nextBtn');
  if (currentQ + 1 >= questions.length) {
    nextBtn.textContent = '結果を見る 🎉';
  } else {
    nextBtn.textContent = '次の問題へ →';
  }
  nextBtn.className = 'next-btn show';
}

// ============================================================
// NEXT QUESTION
// ============================================================
function nextQuestion() {
  currentQ++;
  renderQuestion();
}

// ============================================================
// SHOW RESULT
// ============================================================
function showResult() {
  document.getElementById('screen-quiz').classList.remove('active');
  document.getElementById('screen-result').classList.add('active');

  const pct = (score / 100) * 100;
  
  let emoji, title, msg;
  if (score === 100) {
    emoji = '🏆';
    title = '完璧！パーフェクト！';
    msg = `<strong>全問正解おめでとう！</strong><br>Lv.${currentLevel}の単語はバッチリです。次のレベルに挑戦してみよう！`;
    launchConfetti();
  } else if (score >= 80) {
    emoji = '🎉';
    title = 'すごい！よくできました！';
    msg = `<strong>80点以上！</strong>とても良い結果です。あと少しで完璧。間違えた単語を復習してみよう。`;
  } else if (score >= 60) {
    emoji = '😊';
    title = 'まずまず！もう少し！';
    msg = `<strong>合格ライン突破！</strong>ただし入試本番では確実に取りたい。間違えた単語をしっかり覚えよう。`;
  } else if (score >= 40) {
    emoji = '😅';
    title = 'もう少し練習しよう！';
    msg = `<strong>まだ課題があります。</strong>焦らず下のレベルから確認するか、もう一度このレベルに挑戦しよう。`;
  } else {
    emoji = '💪';
    title = 'ドンマイ！繰り返そう！';
    msg = `<strong>この単語たちを覚えれば確実に点数アップ。</strong>下のリストで間違えた単語をチェックして、もう一度チャレンジしよう！`;
  }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultScore').textContent = `${score}点`;
  document.getElementById('resultDetail').textContent = `${questions.length}問中 ${score/10}問正解`;
  document.getElementById('resultMsg').innerHTML = msg;

  // wrong list
  const wrongSection = document.getElementById('wrongListSection');
  if (wrongList.length > 0) {
    let html = `<div class="wrong-list-title">❌ 間違えた単語（${wrongList.length}個）</div>`;
    wrongList.forEach((w, i) => {
      html += `
        <div class="wrong-item">
          <div class="wi-word">${w.word}</div>
          <div class="wi-meaning">→ ${w.meaning}</div>
          ${w.context ? `<div class="wi-miss">${w.context}</div>` : ''}
        </div>
      `;
    });
    wrongSection.innerHTML = html;
  } else {
    wrongSection.innerHTML = '';
  }
}

// ============================================================
// NAVIGATION
// ============================================================
function goHome() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-home').classList.add('active');
}

function retryLevel() {
  startLevel(currentLevel);
}

// ============================================================
// CONFETTI
// ============================================================
function launchConfetti() {
  const wrap = document.getElementById('confettiWrap');
  wrap.innerHTML = '';
  const colors = ['#ff8906','#f25f4c','#e53170','#ffd700','#4fc3f7','#81c784'];
  
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = `${Math.random() * 100}%`;
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDuration = `${1.5 + Math.random() * 2}s`;
    piece.style.animationDelay = `${Math.random() * 0.5}s`;
    piece.style.transform = `rotate(${Math.random() * 360}deg)`;
    wrap.appendChild(piece);
    setTimeout(() => piece.remove(), 3500);
  }
}

// ============================================================
// START
// ============================================================
init();
</script>
